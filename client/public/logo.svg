<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 86" fill="none">
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="112" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!--
    M shape: two arched strokes, thick rounded ends, gradient left=blue right=violet
    Path: bottom-left leg → up → left arch → down to valley → up right arch → down → right leg
  -->
  <path
    d="M 12,72 L 12,38 C 12,18 20,8 32,8 C 44,8 50,22 50,42 C 50,22 56,8 68,8 C 80,8 88,18 88,38 L 88,72"
    stroke="url(#mg)"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Dot — bottom-right, violet -->
  <circle cx="99" cy="72" r="8" fill="#7C3AED"/>
</svg>
