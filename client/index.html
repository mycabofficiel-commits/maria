<!doctype html>
<html lang="fr">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary meta (overridden per-page by react-helmet-async) -->
    <title>Mar-ia — Créez votre site web avec l'IA</title>
    <meta name="description" content="Créez un site web professionnel en quelques minutes avec l'IA. Générez, modifiez et publiez grâce à Claude d'Anthropic. Gratuit pour commencer." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Mar-ia" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mar-ia.net/" />
    <meta property="og:title" content="Mar-ia — Créez votre site web avec l'IA" />
    <meta property="og:description" content="Créez un site web professionnel en quelques minutes avec l'IA. Gratuit pour commencer." />
    <meta property="og:image" content="https://mar-ia.net/og-image.png" />
    <meta property="og:site_name" content="Mar-ia" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mar-ia — Créez votre site web avec l'IA" />
    <meta name="twitter:description" content="Créez un site web professionnel en quelques minutes avec l'IA." />
    <meta name="twitter:image" content="https://mar-ia.net/og-image.png" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mar-ia" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Canonical -->
    <link rel="canonical" href="https://mar-ia.net/" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
